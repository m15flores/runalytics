spring:
  application:
    name: metrics-engine

  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/runalytics}
    username: ${POSTGRES_USER:runalytics}
    password: ${POSTGRES_PASSWORD:runalytics}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: metrics-engine-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: ActivityNormalizedDto:com.runalytics.metrics_engine.dto.ActivityNormalizedDto
        spring.json.value.default.type: com.runalytics.metrics_engine.dto.ActivityNormalizedDto
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        "[spring.json.add.type.headers]": false

runalytics:
  kafka:
    topics:
      normalized: activities.normalized
      metrics-calculated: metrics.calculated
      normalized-dlq: activities.normalized.dlq

logging:
  level:
    com.runalytics.metrics: DEBUG
    org.springframework.kafka: INFO