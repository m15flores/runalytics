<div class="dashboard">
  <header class="dashboard-header">
    <span class="app-title">Runalytics</span>
    <div class="header-actions">
      <p-tag severity="secondary" value="demo mode" />
      @if (allowUpload) {
        <p-button
          label="Upload FIT"
          icon="pi pi-upload"
          [loading]="uploadStatus() === 'uploading'"
          [disabled]="uploadStatus() === 'uploading'"
          (onClick)="onUploadClick()" />
      } @else {
        <p-button
          label="Upload FIT"
          icon="pi pi-upload"
          [disabled]="true"
          pTooltip="Upload available when running locally. See README."
          tooltipPosition="bottom" />
      }
    </div>
  </header>

  <input #fileInput type="file" accept=".fit" style="display:none" (change)="onFileSelected($event)" />

  @if (uploadStatus() === 'success') {
    <div class="upload-banner upload-banner--success">
      <i class="pi pi-check-circle"></i>
      FIT file uploaded — pipeline started. Results will appear shortly.
    </div>
  }
  @if (uploadStatus() === 'error') {
    <div class="upload-banner upload-banner--error">
      <i class="pi pi-times-circle"></i>
      Upload failed. Make sure the backend is running.
    </div>
  }

  <main class="dashboard-content">
    <p-tabs [(value)]="activeTab">
      <p-tablist>
        <p-tab value="0">
          <i class="pi pi-chart-bar"></i>
          Metrics
        </p-tab>
        <p-tab value="1">
          <i class="pi pi-file"></i>
          Weekly Report
        </p-tab>
        <p-tab value="2">
          <i class="pi pi-comments"></i>
          AI Coach
        </p-tab>
      </p-tablist>
      <p-tabpanels>
        <p-tabpanel value="0">
          <app-metrics-tab [metrics]="latestMetrics()" />
        </p-tabpanel>
        <p-tabpanel value="1">
          <app-report-tab [refreshTrigger]="refreshCounter()" />
        </p-tabpanel>
        <p-tabpanel value="2">
          <app-coach-tab [refreshTrigger]="refreshCounter()" />
        </p-tabpanel>
      </p-tabpanels>
    </p-tabs>
  </main>
</div>
