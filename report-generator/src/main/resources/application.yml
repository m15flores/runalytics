spring:
  application:
    name: report-generator

  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/report_generator}
    username: ${POSTGRES_USER:runalytics}
    password: ${POSTGRES_PASSWORD:runalytics}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: report-generator-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: metricsCalculated:com.runalitycs.report_generator.dto.ActivityMetricsDto
        spring.json.value.default.type: com.runalitycs.report_generator.dto.ActivityMetricsDto
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: reportGenerated:com.runalitycs.report_generator.dto.ReportGeneratedEventDto,metricsCalculated:com.runalitycs.report_generator.dto.ActivityMetricsDto

server:
  port: 8083

app:
  timezone: Europe/Paris

  kafka:
    topics:
      metrics-calculated: metrics.calculated
      reports-generated: reports.generated
      dlq: reports.dlq