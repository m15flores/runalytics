spring:
  kafka:
    bootstrap-servers: localhost:9092

    consumer:
      group-id: report-generator-test-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: metricsCalculated:com.runalitycs.report_generator.dto.ActivityMetricsDto

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: reportGenerated:com.runalitycs.report_generator.dto.ReportGeneratedEventDto,metricsCalculated:com.runalitycs.report_generator.dto.ActivityMetricsDto

  datasource:
    url: jdbc:tc:postgresql:15-alpine:///testdb
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  jpa:
    hibernate:
      ddl-auto: create-drop

app:
  kafka:
    topics:
      metrics-calculated: metrics.calculated
      reports-generated: reports.generated
      dlq: reports.dlq