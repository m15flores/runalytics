spring:
  application:
    name: activity-normalizer

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: activity-normalizer-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        "[spring.json.trusted.packages]": "*"
        "[spring.json.use.type.headers]": false
        "[spring.json.value.default.type]": "java.lang.String"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        "[spring.json.add.type.headers]": false

  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/runalytics}
    username: ${POSTGRES_USER:runalytics}
    password: ${POSTGRES_PASSWORD:runalytics}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

runalytics:
  kafka:
    topics:
      raw-ingested: activities.raw.ingested
      normalized: activities.normalized

logging:
  level:
    root: INFO
    com.runalytics: DEBUG
    org.springframework.kafka: INFO
    org.hibernate.SQL: DEBUG