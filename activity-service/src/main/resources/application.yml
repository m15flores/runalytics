server:
  port: 8082

spring:
  application:
    name: activity-service

  servlet:
    multipart:
      enabled: true
      max-file-size: 1MB
      max-request-size: 2MB

  # Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        "[spring.json.add.type.headers]": false
    consumer:
      group-id: activity-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        "[spring.json.trusted.packages]": "*"

  # MongoDB Configuration
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://runalytics:runalytics@mongodb:27017/runalytics_raw?authSource=admin}
      auto-index-creation: true


# Management/Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  health:
    defaults:
      enabled: true

# Custom Kafka Topics
runalytics:
  kafka:
    topics:
      raw-ingested: activities.raw.ingested
      normalized: activities.normalized
      metrics-calculated: activities.metrics.calculated
      aggregated-weekly: activities.aggregated.weekly
      ai-insights: analytics.ai.insights

# Logging
logging:
  level:
    root: INFO
    com.runalytics: DEBUG
    com.runalytics.activity: DEBUG
    org.springframework.kafka: INFO
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# OpenAPI/Swagger
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha